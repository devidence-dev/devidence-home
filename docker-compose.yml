services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devidence-home
    restart: unless-stopped
    # Resource limits using deploy (recommended for production)
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    # Security settings
    security_opt:
      - no-new-privileges:true
    # Add more security with seccomp
    # Uncomment when you have a seccomp profile ready
    # security_opt:
    #   - seccomp:seccomp-profile.json
    # Drop capabilities
    cap_drop:
      - ALL
    # Read-only root filesystem
    read_only: true
    # Mount temporary filesystem for writable directories
    tmpfs:
      - /tmp:mode=1777
      - /data:mode=755,uid=1000,gid=1000
      - /config:mode=755,uid=1000,gid=1000
    # Run as caddy user (non-privileged, UID 1000)
    user: "1000:1000"
    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    